[build]
  base = "."
  publish = "web-dashboard"

[functions]
  node_bundler = "zisi"
  included_files = ["backend-api/dist/data/**"]

[functions.calculate]
  included_files = ["backend-api/dist/**"]

[[redirects]]
  from = "/api/calculate"
  to = "/.netlify/functions/calculate"
  status = 200

[[redirects]]
  from = "/api/market-live"
  to = "/.netlify/functions/market-live"
  status = 200

[[redirects]]
  from = "/api/market-history"
  to = "/.netlify/functions/market-history"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
